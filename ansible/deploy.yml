---
- name: Deploy Calculator Container
  hosts: target

  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:

    - name: Pull Docker Image
      docker_image:
        name: "gsunil123/calculator:latest"
        source: pull

    - name: Start Docker Service
      service:
        name: docker
        state: started

    - name: Check if container exists
      shell: docker ps -a --filter "name=calculator-container" --format "{{'{{'}}.Names{{'}}'}}"
      register: container_check
      ignore_errors: yes

    - name: Stop container
      shell: docker stop calculator-container
      when: container_check.stdout == "calculator-container"

    - name: Remove container
      shell: docker rm calculator-container
      when: container_check.stdout == "calculator-container"

    - name: Run new container
      shell: docker run -it -d --name calculator-container gsunil123/calculator:latest